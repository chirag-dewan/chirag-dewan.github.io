<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Chirag Dewan</title>
  <meta name="description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <link rel="canonical" href="https://chirag-dewan.github.io/blog/">
  <meta property="og:title" content="Blog — Chirag Dewan">
  <meta property="og:description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chirag-dewan.github.io/blog/">
  <meta property="og:image" content="https://chirag-dewan.github.io/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blog — Chirag Dewan">
  <meta name="twitter:description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <meta name="twitter:image" content="https://chirag-dewan.github.io/og-image.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .post-row {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .post-row + .post-row { margin-top: 0.6rem; }
    .post-row .project-card { cursor: pointer; transition: border-color 0.3s; }
    .post-row:hover .project-card { border-color: var(--green-dim); }
    .post-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
      font-family: var(--font);
    }
    .post-meta .date { color: var(--amber); }
    .post-meta .sep { color: var(--text-dim); margin: 0 0.4rem; }
    .blog-empty {
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__home">cdewan</a>
      <button class="nav__toggle" aria-label="Toggle navigation">≡</button>
      <ul class="nav__links">
        <li><a href="/about.html">about</a></li>
        <li><a href="/projects/">projects</a></li>
        <li><a href="/blog/">blog</a></li>
      </ul>
    </div>
  </nav>

  <main>
  <div class="container">
    <h1 class="section-header"><span>~/blog</span></h1>

    <p style="font-size: 1rem; color: var(--text); line-height: 1.7; max-width: 580px; margin-bottom: 1.5rem;">Notes on AI security, agent red teaming, and behavioral detection. <span style="color: var(--green);">Working out loud — failed attempts included.</span></p>

    <p style="font-size: 0.8rem; color: var(--green); margin-bottom: 0.8rem; font-weight: 600;">$ ls -lt posts/</p>

    <div id="post-list"></div>

    <noscript>
      <div class="blog-empty">
        JavaScript is required to render the post list dynamically.
        <a href="/blog/post.html?slug=adaptive-defenses-attack-surface" style="color: var(--green);">→ Adaptive Defenses Are an Attack Surface</a>
      </div>
    </noscript>
  </div>
  </main>

  <footer class="footer">
    <div class="footer__links">
      <a href="https://github.com/chirag-dewan">github</a>
      <a href="https://linkedin.com/in/cdewan">linkedin</a>
      <a href="mailto:chirag0728@gmail.com">email</a>
      <a href="/Chirag_Dewan_Resume.pdf">resume</a>
    </div>
    <p>© 2026 Chirag Dewan</p>
    <p class="footer__tagline">> see the pattern, not the content.</p>
    <p class="footer__push"></p>
  </footer>

  <script src="../js/main.js" defer></script>
  <script>
    (async function () {
      const list = document.getElementById('post-list');
      try {
        const res = await fetch('./posts.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('posts.json ' + res.status);
        const posts = await res.json();
        if (!Array.isArray(posts) || posts.length === 0) {
          list.innerHTML = '<p class="blog-empty">No posts yet.</p>';
          return;
        }
        posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
        list.innerHTML = posts.map((p) => {
          const tags = (p.tags || []).map((t) => `<span class="stack-tag">${esc(t)}</span>`).join('');
          const status = p.status
            ? `<div class="project-card__status">Status: <span class="active">${esc(p.status)}</span></div>`
            : '';
          return `
            <a class="post-row" href="/blog/post.html?slug=${encodeURIComponent(p.slug)}">
              <div class="project-card line-in animate-in">
                <div class="post-meta">
                  <span class="date">${esc(p.date || '')}</span>
                  ${p.status ? `<span class="sep">·</span><span>${esc(p.status)}</span>` : ''}
                </div>
                <div class="project-card__name">${esc(p.title)}</div>
                <div class="project-card__thesis">${esc(p.excerpt || '')}</div>
                <div class="project-card__stack">${tags}</div>
                ${status}
                <span class="project-card__link">→ read</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (err) {
        list.innerHTML = '<p class="blog-empty">Could not load posts. <a href="https://github.com/chirag-dewan/chirag-dewan.github.io/tree/main/blog" style="color: var(--green);">View source on GitHub.</a></p>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
