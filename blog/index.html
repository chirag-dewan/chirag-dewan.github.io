<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing · Chirag Dewan</title>
  <meta name="description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <link rel="canonical" href="https://www.cdewan.me/blog/">
  <meta property="og:title" content="Writing · Chirag Dewan">
  <meta property="og:description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.cdewan.me/blog/">
  <meta property="og:image" content="https://www.cdewan.me/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Writing · Chirag Dewan">
  <meta name="twitter:description" content="Notes on AI security, agent red teaming, and behavioral detection.">
  <meta name="twitter:image" content="https://www.cdewan.me/og-image.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .post-row { display: block; text-decoration: none; color: inherit; }
    .post-row .project-card { cursor: pointer; }
    .post-row:hover .project-card__name { color: var(--attack); }
    .post-meta {
      font-family: var(--font-mono); font-size: 0.74rem; letter-spacing: 0.02em;
      color: var(--ink-soft); margin-bottom: 0.5rem;
    }
    .post-meta .date { color: var(--slate); }
    .post-meta .sep { color: var(--text-dim); margin: 0 0.45rem; }
    .blog-empty { font-size: 0.95rem; color: var(--text-muted); font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__home">cdewan</a>
      <button class="nav__toggle" aria-label="Toggle navigation">≡</button>
      <ul class="nav__links">
        <li><a href="/projects/">projects</a></li>
        <li><a href="/blog/">writing</a></li>
      </ul>
    </div>
  </nav>

  <main>
  <div class="container">
    <h1 class="section-header"><span>Writing</span></h1>

    <p style="font-size: 1.1rem; color: var(--ink-soft); line-height: 1.6; max-width: 580px; margin-bottom: 1.5rem; font-style: italic;">Notes on AI security, agent red teaming, and behavioral detection. Working out loud, failed attempts included.</p>

    <p class="sec-label" style="margin-top:1.5rem;">Posts</p>

    <div id="post-list"></div>

    <noscript>
      <div class="blog-empty">JavaScript is required to render the post list dynamically. No posts published yet.</div>
    </noscript>
  </div>
  </main>

  <footer class="footer">
    <div class="footer__links">
      <a href="https://github.com/chirag-dewan">github</a>
      <a href="https://linkedin.com/in/cdewan">linkedin</a>
      <a href="mailto:chirag0728@gmail.com">email</a>
      <a href="/Chirag_Dewan_Resume.pdf">resume</a>
    </div>
    <p>© 2026 Chirag Dewan</p>
    <p class="footer__tagline">see the pattern, not the content.</p>
    <p class="footer__push"></p>
  </footer>

  <script src="../js/main.js" defer></script>
  <script>
    (async function () {
      const list = document.getElementById('post-list');
      try {
        const res = await fetch('./posts.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('posts.json ' + res.status);
        const posts = await res.json();
        if (!Array.isArray(posts) || posts.length === 0) {
          list.innerHTML = '<p class="blog-empty">No posts yet.</p>';
          return;
        }
        posts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
        list.innerHTML = posts.map((p) => {
          const tags = (p.tags || []).map((t) => `<span class="stack-tag">${esc(t)}</span>`).join('');
          // Standalone posts can set `url` (their own page); others fall back to the slug renderer.
          const href = p.url ? p.url : `/blog/post.html?slug=${encodeURIComponent(p.slug)}`;
          return `
            <a class="post-row" href="${esc(href)}">
              <div class="project-card line-in animate-in">
                <div class="post-meta">
                  <span class="date">${esc(p.date || '')}</span>
                  ${p.status ? `<span class="sep">·</span><span>${esc(p.status)}</span>` : ''}
                </div>
                <div class="project-card__name">${esc(p.title)}</div>
                <div class="project-card__thesis">${esc(p.excerpt || '')}</div>
                <div class="project-card__stack">${tags}</div>
                <span class="project-card__link">→ read</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (err) {
        list.innerHTML = '<p class="blog-empty">Could not load posts. <a href="https://github.com/chirag-dewan/chirag-dewan.github.io/tree/main/blog" style="color: var(--attack);">View source on GitHub.</a></p>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
